---
name: release
on:
  push:
    tags: ['v*']
permissions:
  contents: write
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build binaries
        env:
          CGO_ENABLED: 0
        run: |
          ldflags="-X github.com/wkentaro/acron/internal/cli.version=$(git describe --tags --always)"
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            export GOOS=${platform%/*} GOARCH=${platform#*/}
            go build -trimpath -ldflags "$ldflags" -o "acron-$GOOS-$GOARCH" .
          done
      - name: Extract release notes from CHANGELOG
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" {flag=1; next}
            flag && (/^## \[/ || /^\[[^]]+\]:/) {exit}
            flag {buf = buf $0 "\n"}
            END { sub(/^\n+/, "", buf); sub(/\n+$/, "\n", buf); printf "%s", buf }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::no CHANGELOG.md section for $version; promote [Unreleased] before tagging"
            exit 1
          fi
      - uses: softprops/action-gh-release@v2
        with:
          files: acron-*
          body_path: release-notes.md
          fail_on_unmatched_files: true
